services:
  test-task:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/Dockerfile
    container_name: test-task-app
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=test-task-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - HTTP_ADDR=:8080
      - HTTP_TIMEOUT=${HTTP_TIMEOUT}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - 8080:8080
    restart:
      always

  test-task-postgres:
    image: postgres:18.3-bookworm
    container_name: test-task-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    ports:
      - ${POSTGRES_PORT}:5432
    restart:
      always
  
  test-task-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  swagger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.26-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
        - ${PROJECT_ROOT}:/code
